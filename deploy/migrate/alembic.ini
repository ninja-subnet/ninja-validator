# Alembic configuration. The DB URL is intentionally NOT set here — env.py
# reads it from the DATABASE_URL environment variable so the same config works
# in Docker, CI, and locally without committing credentials.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is supplied at runtime via DATABASE_URL (see alembic/env.py)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
