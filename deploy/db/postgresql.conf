# =============================================================================
# postgresql.conf — tuned baseline
# -----------------------------------------------------------------------------
# Sized for a host/container with ~8 GB RAM, 4 vCPUs, SSD storage (matches the
# `deploy.resources` block in docker-compose.yml). The stock Postgres defaults
# assume a tiny machine (128MB shared_buffers, no parallelism, conservative WAL)
# and are the #1 cause of "Postgres is slow" complaints. Scale the values with
# the formulas in the comments if your hardware differs.
#
# Rule-of-thumb formulas (RAM = total memory available to Postgres):
#   shared_buffers          = 25% of RAM
#   effective_cache_size    = 75% of RAM (a planner hint, not an allocation)
#   maintenance_work_mem    = ~5% of RAM, capped ~1GB (2GB for big bulk loads)
#   work_mem                = (RAM * 0.25) / max_connections / 2   (per sort/hash op)
# =============================================================================

# --- Connections -------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200            # Pair with a pooler (PgBouncer) in production;
                                 # connections are expensive, pooling beats raising this.
superuser_reserved_connections = 3

# --- Memory ------------------------------------------------------------------
shared_buffers = 2GB             # 25% of 8GB
effective_cache_size = 6GB       # 75% of 8GB (planner estimate of OS+PG cache)
maintenance_work_mem = 512MB     # speeds up VACUUM, CREATE INDEX, ALTER TABLE
work_mem = 16MB                  # per sort/hash node; total can be many * this,
                                 # so keep modest relative to max_connections
huge_pages = try                 # use OS huge pages if available, else fall back

# --- Write-Ahead Log / Checkpoints -------------------------------------------
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB               # fewer, larger checkpoints = smoother write load
checkpoint_completion_target = 0.9   # spread checkpoint I/O to avoid stalls
checkpoint_timeout = 15min
wal_compression = on
synchronous_commit = on          # durable. Set 'off' to trade crash-safety of the
                                 # last few txns for a big write-throughput boost.

# --- Planner / Storage assumptions (SSD) -------------------------------------
random_page_cost = 1.1           # SSDs: random ~= sequential (default 4.0 is for spinning disks)
effective_io_concurrency = 200   # number of concurrent I/Os an SSD handles well
default_statistics_target = 100  # raise to 250–500 for skewed/large tables

# --- Parallelism -------------------------------------------------------------
max_worker_processes = 4                # >= number of vCPUs
max_parallel_workers = 4                # cap on parallel workers cluster-wide
max_parallel_workers_per_gather = 2     # workers a single query may use
max_parallel_maintenance_workers = 2    # parallel index builds / VACUUM
jit = on                                # JIT compile heavy analytical queries

# --- Autovacuum (keep bloat & stale stats from degrading performance) --------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 15s
autovacuum_vacuum_scale_factor = 0.05   # vacuum after 5% of rows change (default 20%)
autovacuum_analyze_scale_factor = 0.02  # analyze after 2% change
autovacuum_vacuum_cost_limit = 2000     # let autovacuum keep up on busy tables

# --- Observability: find bottlenecks before they bite ------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
track_io_timing = on
track_activity_query_size = 4096
log_min_duration_statement = 1000   # log any statement slower than 1s
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0                  # log every temp file (means work_mem too low)
log_autovacuum_min_duration = 0
log_line_prefix = '%m [%p] %q%u@%d '

# --- Misc --------------------------------------------------------------------
timezone = 'UTC'
datestyle = 'iso, mdy'
lc_messages = 'C'
